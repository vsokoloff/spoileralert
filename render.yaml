services:
  - type: web
    name: spoileralert-backend
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: spoileralert-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: spoileralert-db
    plan: free
    databaseName: spoileralert
    user: spoileralert